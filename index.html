<!doctype html>
<html lang="fr">
  <head>
    <link rel="stylesheet" href="./index.css">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <title>Portfolio</title>
  </head>
  <body>
  <main class="bg-success-subtle">
    <p class="text-center pt-5 fs-5">Étudiante en développement web et web mobile full-stack, motivée et rigoureuse, je recherche un stage pour mettre mes compétences en pratique et participer à des projets innovants.</p>
    
  <div class="d-flex justify-content-around mt-5 ">
    <img src="./actioncomic.png" class="rounded float-start rounded-circle" alt="..." id="image_comic">
    <img src="./restaurant.jpg" class="rounded float-center rounded-circle" alt="..." id="image_restaurant">
    <img src="./voyage.jpg" class="rounded float-end rounded-circle" alt="..." id="image_voyage">
  </div>
  <div class="d-flex justify-content-around">
    <button id="boutton_comic" type="button" class="btn btn-secondary bg-body text-dark" data-bs-container="body" data-bs-toggle="popover" data-bs-placement="top" data-bs-content="Top popover">
    Projet Comics
    </button>
    <button id="boutton_restaurant"  type="button" class="btn btn-secondary bg-body text-dark" data-bs-container="body" data-bs-toggle="popover" data-bs-placement="top" data-bs-content="Top popover">
      Projet Kitchen 
      </button>
      <button id="boutton_voyage" type="button" class="btn btn-secondary bg-body text-dark" data-bs-container="body" data-bs-toggle="popover" data-bs-placement="top" data-bs-content="Top popover">
        Projet Voyage
        </button>
  </div>

  <p class="text-center mt-5">Contactez-moi!</p>
  <div class="mt-2 mb-3 d-flex justify-content-center">
    <label for="exampleFormControlInput1" class="form-label"></label>
    <input type="email" class="form-control w-50 p-3" id="exampleFormControlInput1" placeholder="name@example.com*" required>
  </div>
  <div class="mb-3 d-flex justify-content-center">
    <label for="exampleFormControlTextarea1" class="form-label"></label>
    <textarea class="form-control w-50 p-3"id="exampleFormControlTextarea1" rows="3" placeholder="Dites-moi tout..."></textarea>
  </div>
  </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  </body>
